<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-10 border-b border-slate-700 pb-5">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">🅿️ Parking System</h1>
                <p class="text-slate-400">Monitoreo en tiempo real desde GitHub</p>
            </div>
            <div id="status" class="px-4 py-1 rounded-full text-xs font-bold bg-red-500/20 text-red-500 border border-red-500/50">
                DESCONECTADO
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-sm uppercase">Vehículos Actuales</p>
                <h2 id="total-parking" class="text-4xl font-bold">0</h2>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-sm uppercase">Recaudación Visual</p>
                <h2 id="total-revenue" class="text-4xl font-bold text-green-400">0€</h2>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-700/50 text-slate-300">
                        <th class="p-4">Vehículo</th>
                        <th class="p-4">Placa</th>
                        <th class="p-4">Entrada</th>
                        <th class="p-4">Estado</th>
                        <th class="p-4 text-right">Monto</th>
                    </tr>
                </thead>
                <tbody id="parking-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io('http://localhost:3000');
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('parking-list');

        socket.on('connect', () => {
            statusEl.innerText = 'CONECTADO';
            statusEl.className = 'px-4 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/50';
        });

        socket.on('disconnect', () => {
            statusEl.innerText = 'DESCONECTADO';
            statusEl.className = 'px-4 py-1 rounded-full text-xs font-bold bg-red-500/20 text-red-500 border border-red-500/50';
        });

        socket.on('parking_update', (data) => {
            renderParking(data);
        });

        function renderParking(vehiculos) {
            listEl.innerHTML = '';
            let totalRevenue = 0;
            let activeVehicles = 0;

            vehiculos.forEach(v => {
                const isOut = v.salida !== null;
                if (!isOut) activeVehicles++;
                
                const monto = isOut ? v.monto_pagar : (v.monto_provisional || 0);
                if (isOut) totalRevenue += monto;

                const row = `
                    <tr class="border-b border-slate-700 hover:bg-slate-700/30 transition">
                        <td class="p-4">
                            <span class="block font-bold">${v.marca}</span>
                            <span class="text-xs text-slate-500">${v.color}</span>
                        </td>
                        <td class="p-4 font-mono text-blue-300">${v.placa}</td>
                        <td class="p-4 text-sm text-slate-400">${new Date(v.entrada).toLocaleString()}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold ${isOut ? 'bg-slate-600 text-slate-300' : 'bg-blue-500/20 text-blue-400 border border-blue-500/50'}">
                                ${isOut ? 'SALIDA' : 'PARKEADO'}
                            </span>
                        </td>
                        <td class="p-4 text-right font-bold ${isOut ? 'text-green-400' : 'text-slate-500'}">
                            ${monto}€
                        </td>
                    </tr>
                `;
                listEl.innerHTML += row;
            });

            document.getElementById('total-parking').innerText = activeVehicles;
            document.getElementById('total-revenue').innerText = totalRevenue + '€';
        }
    </script>
</body>
</html>
